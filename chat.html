<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
  <div style="display:flex; border-top:1px solid #ccc;">
    <input id="input" type="text" placeholder="Type..." style="flex:1; padding:8px; border:none;" />
    <button id="send" style="padding:8px 12px; border:none; background:#007aff; color:white;">Send</button>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.textContent = sender + ": " + text;
      div.style.margin = "8px 0";
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.onclick = async () => {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "You");
      input.value = "";

      const res = await fetch("https://hot-tub-chat-bot.onrender.com/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "user", content: text }]
        })
      });

      const data = await res.json();
      addMessage(data.reply, "Bot");
    };

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendBtn.click();
    });
  </script>
</body>
</html>
